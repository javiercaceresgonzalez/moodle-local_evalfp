<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">EvalFP</title>
  <desc id="desc">EvalFP</desc>

  <defs>
    <linearGradient id="bg" x1="80" y1="60" x2="430" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2F6FC2"/>
      <stop offset="1" stop-color="#0F3F82"/>
    </linearGradient>

    <linearGradient id="capTop" x1="150" y1="95" x2="360" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#082344"/>
      <stop offset="1" stop-color="#061A32"/>
    </linearGradient>

    <linearGradient id="yellow" x1="160" y1="165" x2="345" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8C400"/>
      <stop offset="1" stop-color="#F4B400"/>
    </linearGradient>

    <filter id="softOuterShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="28" y="28" width="456" height="456" rx="58" fill="url(#bg)" filter="url(#softOuterShadow)"/>

  <!-- Chart bars: flat, clean colours, no inner shadows -->
  <rect x="154" y="294" width="64" height="116" fill="#A8C1E0" opacity="0.95"/>
  <rect x="228" y="326" width="58" height="84" fill="#A8C1E0" opacity="0.82"/>
  <rect x="304" y="246" width="66" height="164" fill="#A8C1E0" opacity="0.95"/>

  <!-- Graduation cap underside -->
  <path d="M128 158 L256 205 L384 158 V194
           C384 209 377 217 362 223
           L281 253
           C264 259 248 259 231 253
           L150 223
           C135 217 128 209 128 194 Z"
        fill="url(#yellow)"/>

  <!-- Cap top -->
  <path d="M78 139 C74 137 74 130 78 128
           L252 66 C255 65 259 65 262 66
           L436 128 C440 130 440 137 436 139
           L262 201 C259 202 255 202 252 201 Z"
        fill="url(#capTop)"/>

  <!-- Tassel -->
  <path d="M116 154 V250" stroke="#F4B400" stroke-width="10" stroke-linecap="round"/>
  <rect x="103" y="246" width="26" height="48" rx="12" fill="#F4B400"/>

  <!-- Main check: clean solid white, without dirty shadow over the bars -->
  <path d="M94 333 L184 244 L257 310 L409 159"
        stroke="#FFFFFF"
        stroke-width="58"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Subtle lower edge for separation, aligned and very light -->
  <path d="M94 333 L184 244 L257 310 L409 159"
        stroke="#EAF2FF"
        stroke-width="18"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.22"/>
</svg>
